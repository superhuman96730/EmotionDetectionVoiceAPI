version: "3.9"

services:
  api:
    build: .
    container_name: emotion-detection-api
    ports:
      - "8000:8000"
    environment:
      - API_TITLE=Emotion Detection Voice API
      - DEBUG=False
      - LOG_LEVEL=INFO
      - DATABASE_URL=sqlite:///./emotion_detection.db
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - db
    networks:
      - emotion-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: sqlite
    container_name: emotion-detection-db
    volumes:
      - ./db_data:/data
    networks:
      - emotion-network

  prometheus:
    image: prom/prometheus:latest
    container_name: emotion-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - emotion-network

volumes:
  db_data:

networks:
  emotion-network:
    driver: bridge
