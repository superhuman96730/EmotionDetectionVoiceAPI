version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emotion-detection-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    restart: unless-stopped
    networks:
      - emotion-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  emotion-net:
    driver: bridge
